const SNIPPETS=[
  {title:"pHash duplicate detection",code:`from imagehash import phash
from PIL import Image

HAMMING_THRESHOLD = 10  # set via .env

def get_phash(filepath: str) -> str:
    with Image.open(filepath) as img:
        return str(phash(img))  # 64-bit hex string

def hamming_distance(h1: str, h2: str) -> int:
    return bin(int(h1, 16) ^ int(h2, 16)).count('1')

def are_duplicates(h1: str, h2: str) -> bool:
    return hamming_distance(h1, h2) <= HAMMING_THRESHOLD`},
  {title:"HRP detection rule",code:`def is_hrp_candidate(local: PhotoRecord,
                      cloud: PhotoRecord) -> bool:
    local_px = local.width * local.height
    cloud_px = cloud.width * cloud.height
    if cloud_px == 0:
        return False
    return (local_px / cloud_px) > 1.2  # 20% more pixels

def apply_hrp_rule(group: DuplicateGroup) -> Action | None:
    cloud = group.get_by_source("google_photos")
    local = group.get_best_local()
    if cloud and local and is_hrp_candidate(local, cloud):
        return Action(
            type="MOVE_TO_HRP", photo=local,
            reason=(f"Local {local.width}x{local.height} > "
                    f"Cloud {cloud.width}x{cloud.height}")
        )
    return None`},
  {title:"Rule engine (priority order)",code:`def apply_rules(groups: list[DuplicateGroup]) -> list[Action]:
    actions = []
    for group in groups:
        sources = {r.source for r in group.all_photos}

        # Rule 1: only 1 source — not backed up, never touch
        if len(sources) < 2:
            actions.append(Action("SKIP", group.primary,
                                  "Only 1 source"))
            continue

        # Rule 2: HRP — high-res local takes priority over delete
        hrp = apply_hrp_rule(group)
        if hrp:
            actions.append(hrp)
            continue

        # Rule 3: hash-confirmed on cloud → delete local
        if ("google_photos" in sources
                and group.cloud_phash_confirmed):
            for photo in group.local_photos:
                actions.append(Action("DELETE", photo,
                    "Hash-confirmed on Google Photos"))
            continue

        # Default: skip (not enough confidence)
        actions.append(Action("SKIP", group.primary,
                              "No confirmed backup"))
    return actions`},
  {title:"LangGraph state + graph wiring",code:`from typing import TypedDict
from langgraph.graph import StateGraph, END
from langgraph.checkpoint.memory import MemorySaver

class AgentState(TypedDict):
    scan_results: dict[str, list[PhotoRecord]]
    duplicate_groups: list[DuplicateGroup]
    action_plan: list[Action]
    execution_results: list[ActionResult]
    user_confirmed: bool
    report: dict

builder = StateGraph(AgentState)
nodes = [
    ("scan", scan_node), ("extract", extract_metadata_node),
    ("detect", detect_duplicates_node),
    ("plan", apply_rules_node),
    ("confirm", confirm_with_user_node),
    ("execute", execute_actions_node),
    ("report", generate_report_node),
]
for name, fn in nodes:
    builder.add_node(name, fn)

builder.set_entry_point("scan")
for a, b in [("scan","extract"),("extract","detect"),
             ("detect","plan"),("plan","confirm")]:
    builder.add_edge(a, b)
builder.add_conditional_edges(
    "confirm",
    lambda s: "execute" if s["user_confirmed"] else END
)
builder.add_edge("execute", "report")
builder.add_edge("report", END)
graph = builder.compile(checkpointer=MemorySaver())`},
];

    {n:"3",a:"storages connected",b:"Google Photos · PC · Mobile"},

    {cond:"Photo in only 1 source",act:"SKIP",bc:"var(--border)",fc:"var(--text-muted)",desc:"Not backed up — never touch"},

  ].map(r=>`<div class="rule-row" style="border-left:3px solid ${r.bc}"><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);min-width:190px">${r.cond}</span><span style="font-size:12px;font-weight:500;color:${r.fc};min-width:130px;padding:0 8px">${r.act}</span><span style="font-size:12px;color:var(--text-muted)">${r.desc}</span></div>`).join("");
  const limits=["Google Photos API cannot download original full-res files — but mediaMetadata.width/height gives original dimensions. Use those for HRP comparison.","Mobile in V1 requires USB File Transfer mode (filesystem mount). ADB support is a V2 addition.","HEIC files need pillow-heif — register_heif_opener() at startup. Skip this and .heic photos won't hash.","First scan of a large library (>50k photos) is slow. Subsequent runs use the SQLite cache."].map(n=>`<div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:var(--text-secondary);line-height:1.5"><i class="ti ti-info-circle" style="font-size:15px;color:var(--text-muted);flex-shrink:0;margin-top:2px" aria-hidden="true"></i><span>${n}</span></div>`).join("");

    const detail=isOpen?`<div style="margin-top:.875rem"><pre class="code">${s.code}</pre></div>`:"";
    return`<div class="phase-card" onclick="toggleSnippet(${i})"><div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><i class="ti ti-code" style="font-size:15px;color:var(--text-muted)" aria-hidden="true"></i><span style="font-weight:500;font-size:14px">${s.title}</span></div><i class="ti ${isOpen?"ti-chevron-up":"ti-chevron-down"}" style="font-size:16px;color:var(--text-muted)" aria-hidden="true"></i></div>${detail}</div>`;
  }).join("");
  return intro+cards;
}

function renderSafety(){
  const intro=`<p style="font-size:14px;color:var(--text-secondary);margin:0 0 12px;line-height:1.6">This agent deletes files. These rules are non-negotiable.</p>`;
  const rows=SAFETY.map(r=>`<div class="safety-row"><i class="ti ${r.icon}" style="font-size:18px;color:${r.color};flex-shrink:0;margin-top:1px" aria-hidden="true"></i><span style="font-size:14px;color:var(--text-primary);line-height:1.5">${r.text}</span></div>`).join("");
  return intro+rows;
}

function renderTree(){
  const tip=`<div style="background:var(--bg-accent);border:.5px solid var(--border-accent);border-radius:8px;padding:.625rem .875rem;font-size:13px;color:var(--text-accent);margin-top:10px"><i class="ti ti-info-circle" style="margin-right:6px" aria-hidden="true"></i>Build order: utils/models.py first, then storage/, then core/, then agent/. main.py (CLI) is last.</div>`;
  return`<div class="card"><pre class="code" style="font-size:12px">${FILE_TREE}</pre>${tip}</div>`;
}

function renderRun(){
  const rows=RUN_STEPS.map((s,i)=>`<div class="run-row"><div class="num-badge">${i+1}</div><div><code style="font-family:var(--font-mono);font-size:12px;color:var(--text-accent);display:block;margin-bottom:3px">${s.cmd}</code><span style="font-size:12px;color:var(--text-muted)">${s.note}</span></div></div>`).join("");
  return rows;
}

function render(){
  const r=document.getElementById("root");
  const tabNav=TABS.map(t=>`<button class="tab-btn${activeTab===t.id?" active":""}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}" aria-hidden="true"></i>${t.label}</button>`).join("");
  let content="";
  if(activeTab==="overview") content=renderOverview();
  else if(activeTab==="stack") content=renderStack();
  else if(activeTab==="phases") content=renderPhases();
  else if(activeTab==="logic") content=renderLogic();
  else if(activeTab==="safety") content=renderSafety();
  else if(activeTab==="tree") content=renderTree();
  else if(activeTab==="run") content=renderRun();
  r.innerHTML=`
<div style="margin-bottom:1.25rem">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><i class="ti ti-camera" style="font-size:20px;color:var(--text-accent)" aria-hidden="true"></i><h1 style="margin:0;font-size:22px;font-weight:500">Photo management agent</h1></div>
  <p style="margin:0 0 .75rem;font-size:14px;color:var(--text-secondary);line-height:1.5">Final implementation spec — deduplicates across Google Photos, PC, and mobile</p>
  <div style="display:flex;flex-wrap:wrap;gap:6px">${["Python 3.11","LangGraph","imagehash","ChromaDB","Typer + Rich"].map(t=>`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-accent);color:var(--text-accent);border:.5px solid var(--border-accent);font-weight:500">${t}</span>`).join("")}</div>
</div>
<div style="display:flex;border-bottom:.5px solid var(--border);margin-bottom:1.25rem;overflow-x:auto">${tabNav}</div>
<div>${content}</div>`;
}

window.setTab=function(id){activeTab=id;openPhase=null;openSnippet=null;render()};
window.togglePhase=function(n){openPhase=openPhase===n?null:n;render()};
window.toggleSnippet=function(i){openSnippet=openSnippet===i?null:i;render()};
render();
</script>
